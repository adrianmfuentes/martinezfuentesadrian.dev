# These two must match exactly what SonarCloud shows under
# https://sonarcloud.io/project/overview?id=<projectKey> for this project —
# adjust if your organization key or project key differ from these guesses.
sonar.organization=adrianmfuentes
sonar.projectKey=adrianmfuentes_martinezfuentesadrian.dev

sonar.projectName=martinezfuentesadrian.dev
sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/public/**,**/*.config.js,**/*.config.mjs,**/dist/**,**/build/**,next-env.d.ts,**/*.d.ts,**/__tests__/**,**/*.test.ts,**/*.test.tsx,vitest.config.ts,vitest.setup.ts,tailwind.config.ts

# coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# components/ui/** are unmodified shadcn/ui primitives (see CLAUDE.md: "do not edit
# directly"); page/layout/loading/error/not-found files are thin Next.js routing
# shells that just compose already-tested components; theme-provider.tsx and
# client-html.tsx are one-purpose next-themes/font wrappers with no branching logic;
# forbidden.tsx is a static 403 page (same class as not-found/error); the
# certificate-viewer pair wraps react-pdf with a module-level pdf.js worker
# side effect and isn't practically unit-testable without a heavy react-pdf mock
# that would test the mock, not the component. None of these carry bespoke logic
# worth covering.
sonar.coverage.exclusions=components/ui/**,components/theme-provider.tsx,components/certificate-viewer.tsx,components/certificate-viewer.client.tsx,app/**/page.tsx,app/**/layout.tsx,app/**/loading.tsx,app/**/error.tsx,app/**/not-found.tsx,app/**/global-error.tsx,app/client-html.tsx,app/forbidden.tsx,app/[lang]/dictionaries/**,scripts/**
