name: Fix Vulnerabilities

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC (after Dependabot runs at 9 AM)
  workflow_dispatch:     # Also triggerable manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Count vulnerabilities
        id: audit
        run: |
          COUNT=$(pnpm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.total // 0' || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Vulnerabilities found: $COUNT"

      - name: Update packages within semver range
        if: steps.audit.outputs.count > 0
        run: pnpm up

      # Build must pass — if it fails the workflow stops and nothing is merged
      - name: Verify build
        if: steps.audit.outputs.count > 0
        run: pnpm build

      - name: Create PR
        if: steps.audit.outputs.count > 0
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(deps): update packages to resolve ${{ steps.audit.outputs.count }} vulnerabilities"
          title: "fix(deps): automated security updates (${{ steps.audit.outputs.count }} vulnerabilities)"
          body: |
            Automated dependency updates to resolve security vulnerabilities.

            - Ran `pnpm up` (updates within declared semver ranges)
            - Build verified ✅

            _Generated by the Fix Vulnerabilities workflow._
          branch: fix/automated-security-updates
          labels: "dependencies,security"
          delete-branch: true

      # Merge immediately — build already passed above, no branch protection needed
      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
