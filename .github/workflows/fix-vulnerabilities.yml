name: Fix Vulnerabilities

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC (after Dependabot runs at 9 AM)
  workflow_dispatch:     # Also triggerable manually from the Actions tab

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Count vulnerabilities
        id: audit
        run: |
          COUNT=$(pnpm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.total // 0' || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Vulnerabilities found: $COUNT"

      - name: Update packages within semver range
        if: steps.audit.outputs.count > 0
        run: pnpm up

      # Build must pass — if it fails the workflow stops and nothing is committed
      - name: Verify build
        if: steps.audit.outputs.count > 0
        run: pnpm build

      # Solo project, no review needed — commit straight to main once the
      # build has proven the update is safe. No point opening a PR just to
      # auto-merge it in the same run.
      - name: Commit and push
        if: steps.audit.outputs.count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "fix(deps): update packages to resolve ${{ steps.audit.outputs.count }} vulnerabilities"
            git push
          fi
