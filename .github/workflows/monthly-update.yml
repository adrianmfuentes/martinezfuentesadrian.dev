name: Monthly Update

on:
  schedule:
    - cron: "0 10 1 * *" # 1st of every month at 10 AM UTC
  workflow_dispatch:     # Triggerable manually from the Actions tab

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Upgrade all packages to latest
        run: pnpm up --latest

      # Build must pass — if it fails the workflow stops before creating a PR
      - name: Verify build
        run: pnpm build

      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): monthly update to latest versions"
          title: "chore(deps): monthly dependency update"
          body: |
            Automated monthly dependency update.

            - Ran `pnpm up --latest` (upgrades all packages to their latest published versions)
            - Build verified ✅

            _Generated by the Monthly Update workflow._
          branch: chore/monthly-dependency-update
          labels: "dependencies"
          delete-branch: true

      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alert-on-failure:
    needs: update
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Monthly update failed — ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Monthly update workflow failed',
                '',
                'The monthly dependency update could not be completed, likely due to a build error after upgrading packages.',
                '',
                `**Run:** ${runUrl}`,
                '',
                '**Action required:** Review the failed run, fix any breaking changes, and re-run manually.',
              ].join('\n'),
              labels: ['bug', 'dependencies'],
            })
